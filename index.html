<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#c0392b">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <title>قلم أحمر - تسجيل الدخول</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/rtl.css">

</head>
<body>

  <div class="login-container">
    <h1 class="logo">🖊️ قلم أحمر</h1>

    <form id="loginForm" class="login-form">
      <input 
        type="email" 
        id="email" 
        placeholder="البريد الإلكتروني" 
        autocomplete="email"
        autofocus
        required>

      <div class="password-field">
        <input 
          type="password" 
          id="password" 
          placeholder="كلمة المرور" 
          autocomplete="current-password"
          required>
        <button type="button" id="togglePassword" class="toggle-password">👁️</button>
      </div>

      <button type="submit" id="loginBtn" class="btn-primary">دخول</button>
      <a href="#" id="forgotPasswordLink" class="forgot-link">نسيت كلمة المرور؟</a>
      <p id="loginError" class="error-message" role="alert"></p>
    </form>

    <p class="switch-auth">
      مستخدم جديد؟ <a href="pages/signup.html">إنشاء حساب</a>
    </p>
  </div>

  <script type="module" src="js/auth/login.js"></script>
  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js')
        .then((reg) => console.log('✅ Service Worker registered:', reg.scope))
        .catch((err) => console.error('❌ Service Worker registration failed:', err));
    });
  }
</script>
</body>
</html>
