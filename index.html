<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>قلم أحمر - تسجيل الدخول</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c0392b">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <script>
  if (localStorage.getItem('qalam_theme') === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
</script>
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">
      <h1 class="auth-logo">🖊️ قلم أحمر</h1>
      <p class="auth-subtitle">منصة إدارة الامتحانات والواجبات</p>

      <form id="loginForm" class="form">
        <input
          type="email"
          id="email"
          placeholder="البريد الإلكتروني"
          autocomplete="email"
          autofocus
          required>

        <div class="password-field">
          <input
            type="password"
            id="password"
            placeholder="كلمة المرور"
            autocomplete="current-password"
            required>
          <button type="button" id="togglePassword" class="toggle-password" aria-label="إظهار كلمة المرور">👁️</button>
        </div>

        <a href="#" id="forgotPasswordLink" class="form-link">نسيت كلمة المرور؟</a>

        <button type="submit" id="loginBtn" class="btn btn-primary btn-block">دخول</button>

        <p id="loginError" class="message error" role="alert"></p>
      </form>

      <p class="auth-footer">
        مستخدم جديد؟ <a href="pages/signup.html">إنشاء حساب</a>
      </p>
    </div>
  </div>

  <script type="module" src="js/auth/login.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js');
      });
    }
  </script>
</body>
</html>
