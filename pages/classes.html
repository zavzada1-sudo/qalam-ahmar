<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>قلم أحمر - الفصول</title>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#c0392b">
  <link rel="apple-touch-icon" href="../assets/icons/icon-192.png">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
</head>
<body>

  <div class="dashboard-layout">

    <!-- القائمة الجانبية -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <span>🖊️</span>
        <span>قلم أحمر</span>
      </div>

      <nav class="sidebar-nav">
        <a href="teacher-dashboard.html" class="nav-item">
          <span class="nav-icon">⌂</span>
          <span>لوحة التحكم</span>
        </a>
        <a href="create-exam.html" class="nav-item">
          <span class="nav-icon">✦</span>
          <span>إنشاء امتحان</span>
        </a>
        <button class="nav-item active" type="button">
          <span class="nav-icon">▦</span>
          <span>الفصول والطلاب</span>
        </button>

        <a href="materials.html" class="nav-item">
          <span class="nav-icon">📚</span>
          <span>المواد التعليمية</span>
        </a>

        <button class="nav-item" type="button">
          <span class="nav-icon">✓</span>
          <span>الحضور</span>
        </button>
        <button class="nav-item" type="button">
          <span class="nav-icon">▤</span>
          <span>التقارير</span>
        </button>
      </nav>

      <button class="sidebar-logout" id="logoutBtn" type="button">
        <span>↪</span>
        <span>تسجيل الخروج</span>
      </button>
    </aside>

    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- المحتوى الرئيسي -->
    <main class="dashboard-content">

      <!-- الشريط العلوي -->
      <header class="dashboard-topbar">
        <div style="display: flex; align-items: center; gap: 12px;">
          <button class="menu-toggle" id="menuToggle" type="button" aria-label="القائمة">☰</button>
          <div class="topbar-greeting">
            <h1 id="pageTitle">الفصول والطلاب</h1>
            <p id="pageSubtitle">اختر سنة دراسية لعرض مجموعاتها</p>
          </div>
        </div>
      </header>

      <!-- شريط التنقل (Breadcrumb) -->
      <div class="breadcrumb" id="breadcrumb">
        <span class="breadcrumb-item active" id="crumbGrades">السنوات الدراسية</span>
      </div>

      <!-- ======== المستوى 1: السنوات الدراسية ======== -->
      <section id="gradesView">
        <div class="section-header">
          <h2>السنوات الدراسية</h2>
          <button class="btn btn-primary" id="addGradeBtn">+ إضافة سنة</button>
        </div>
        <div id="gradesList" class="cards-grid">
          <p class="loading-text">جاري التحميل...</p>
        </div>
      </section>

      <!-- ======== المستوى 2: المجموعات ======== -->
      <section id="groupsView" class="hidden">
        <div class="section-header">
          <h2 id="currentGradeName">المجموعات</h2>
          <button class="btn btn-primary" id="addGroupBtn">+ إضافة مجموعة</button>
        </div>
        <div id="groupsList" class="cards-grid">
          <p class="loading-text">جاري التحميل...</p>
        </div>
      </section>

    </main>
  </div>

  <!-- شاشة إضافة سنة/مجموعة (Modal) -->
  <div id="addModal" class="modal-overlay hidden">
    <div class="modal-box">
      <h2 class="modal-title" id="addModalTitle">إضافة</h2>
      <form id="addForm" class="form">
        <input type="text" id="addInput" placeholder="اكتب الاسم" autocomplete="off" required>
        <div style="display: flex; gap: 10px;">
          <button type="submit" id="addSaveBtn" class="btn btn-primary btn-block">حفظ</button>
          <button type="button" id="addCancelBtn" class="btn btn-outline btn-block">إلغاء</button>
        </div>
        <p id="addError" class="message error" role="alert"></p>
      </form>
    </div>
  </div>

  <script type="module" src="../js/teacher/classes.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js');
      });
    }
  </script>
</body>
</html>
