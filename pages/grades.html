<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نتائج الامتحان - قلم أحمر</title>
  <meta name="theme-color" content="#c0392b" />
  <link rel="manifest" href="../manifest.json" />
  <script>
  if (localStorage.getItem('qalam_theme') === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
</script>



  <!-- نظام التصميم الموحّد -->
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/rtl.css" />
</head>
<body>

  <div class="grades-page">

    <!-- ===== مسار التنقل ===== -->
    <div class="breadcrumb">
      <a href="teacher-dashboard.html" class="breadcrumb-item">لوحة التحكم</a>
      <span class="breadcrumb-separator">›</span>
      <span class="breadcrumb-item active">النتائج</span>
    </div>

    <!-- ===== حالة التحميل ===== -->
    <div id="loadingState" class="exam-loading">
      <div class="loading-spinner"></div>
      <p>بنحمّل النتايج...</p>
    </div>

    <!-- ===== حالة الخطأ ===== -->
    <div id="errorState" class="exam-error hidden">
      <div class="error-icon">⚠️</div>
      <h3 id="errorText"></h3>
      <a href="teacher-dashboard.html" class="btn btn-primary">رجوع للوحة التحكم</a>
    </div>

    <!-- ===== المحتوى ===== -->
    <div id="contentWrapper" class="hidden">

      <!-- رأس الصفحة -->
      <div class="grades-header">
        <div>
          <h1 id="examTitle"></h1>
          <p id="examMeta"></p>
        </div>
        <button id="exportBtn" class="btn btn-outline" type="button">
          ⬇ تصدير CSV
        </button>
      </div>

      <!-- كروت الإحصائيات (نفس كروت لوحة التحكم) -->
      <div class="stats-grid">
        <div class="stat-card red">
          <div class="stat-icon">📥</div>
          <div class="stat-info">
            <strong id="statSubmitted">0/0</strong>
            <p>سلّموا الامتحان</p>
          </div>
        </div>
        <div class="stat-card blue">
          <div class="stat-icon">📊</div>
          <div class="stat-info">
            <strong id="statAverage">—</strong>
            <p>متوسط النسبة</p>
          </div>
        </div>
        <div class="stat-card green">
          <div class="stat-icon">🏆</div>
          <div class="stat-info">
            <strong id="statHighest">—</strong>
            <p>أعلى نسبة</p>
          </div>
        </div>
        <div class="stat-card orange">
          <div class="stat-icon">📉</div>
          <div class="stat-info">
            <strong id="statLowest">—</strong>
            <p>أقل نسبة</p>
          </div>
        </div>
      </div>

      <!-- أدوات البحث والفلترة -->
      <div class="grades-toolbar">
        <input
          type="search"
          id="searchInput"
          class="gd-search"
          placeholder="ابحث باسم الطالب أو كوده..."
          autocomplete="off"
        />
        <select id="filterSelect" class="grades-select">
          <option value="all">كل الطلاب</option>
          <option value="submitted">اللي سلّموا</option>
          <option value="missing">اللي ما سلّموش</option>
        </select>
        <select id="sortSelect" class="grades-select">
          <option value="score_desc">الأعلى درجة</option>
          <option value="score_asc">الأقل درجة</option>
          <option value="name">ترتيب أبجدي</option>
        </select>
      </div>

      <!-- عناوين الأعمدة (تختفي على الموبايل) -->
      <div class="grades-columns">
        <span class="col-student">الطالب</span>
        <span class="col-status">الحالة</span>
        <span class="col-score">الدرجة</span>
        <span class="col-time">الوقت</span>
      </div>

      <!-- قائمة الطلاب -->
      <div id="studentsList" class="gd-list"></div>

      <!-- لا يوجد نتائج مطابقة -->
      <div id="listEmpty" class="empty-state hidden">
        <div class="empty-icon">🔍</div>
        <h3>مفيش طلاب مطابقين</h3>
        <p>جرّب تغيّر كلمة البحث أو الفلتر.</p>
      </div>

    </div>
  </div>

  <!-- ===== تنسيقات خاصة بالصفحة دي بس ===== -->
  <style>
    .grades-page {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* رأس الصفحة */
    .grades-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }
    .grades-header h1 {
      font-size: 22px;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .grades-header p {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* شريط الأدوات */
    .grades-toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .grades-toolbar .gd-search {
      flex: 1;
      min-width: 200px;
      margin-bottom: 0;
    }
    .grades-select {
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: .9rem;
      background: #fff;
      color: var(--text);
    }
    .grades-select:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* عناوين الأعمدة */
    .grades-columns {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px 8px;
      font-size: .78rem;
      font-weight: 700;
      color: var(--text-light);
    }
    .grades-columns .col-student { flex: 1; }
    .grades-columns .col-status  { width: 110px; flex-shrink: 0; }
    .grades-columns .col-score   { width: 120px; flex-shrink: 0; }
    .grades-columns .col-time    { width: 70px;  flex-shrink: 0; }

    /* صف الطالب (بيبني على .gd-row من main.css) */
    .grade-row-status { width: 110px; flex-shrink: 0; }
    .grade-row-score  { width: 120px; flex-shrink: 0; }
    .grade-row-time   {
      width: 70px;
      flex-shrink: 0;
      font-size: .85rem;
      color: var(--text-light);
      font-variant-numeric: tabular-nums;
    }

    /* شارات الحالة */
    .grade-badge {
      display: inline-block;
      padding: 4px 11px;
      border-radius: 20px;
      font-size: .76rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .grade-badge.graded  { background: var(--green-light);  color: var(--green); }
    .grade-badge.queued  { background: var(--orange-light); color: var(--orange); }
    .grade-badge.missing { background: #f0f0f0;             color: #888; }
    .grade-badge.former  {
      background: var(--purple-light);
      color: var(--purple);
      font-size: .68rem;
      padding: 2px 8px;
      margin-inline-start: 4px;
    }

    /* الدرجة */
    .grade-score {
      font-weight: 700;
      font-size: .98rem;
      font-variant-numeric: tabular-nums;
    }
    .grade-score small {
      font-size: .78rem;
      font-weight: 600;
      opacity: .75;
      margin-inline-start: 3px;
    }
    .grade-score.pass { color: var(--green); }
    .grade-score.mid  { color: var(--orange); }
    .grade-score.fail { color: var(--primary); }
    .grade-score-empty { color: var(--text-light); }

    /* تجاوب الموبايل: نخفي عناوين الأعمدة ونخلي الصف يلف */
    @media (max-width: 640px) {
      .grades-columns { display: none; }
      .grade-row { flex-wrap: wrap; }
      .gd-row-info { flex-basis: 100%; }
      .grade-row-status,
      .grade-row-score,
      .grade-row-time { width: auto; }
      .grade-row-time { margin-inline-start: auto; }
    }
  </style>

  <!-- منطق الصفحة (ES Module زي باقي المشروع) -->
  <script type="module" src="../js/teacher/grades.js"></script>
</body>
</html>
