<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مراجعة تسليم - قلم أحمر</title>
  <meta name="theme-color" content="#c0392b" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../assets/icons/icon-192.png" />
  <script>
  if (localStorage.getItem('qalam_theme') === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
  </script>

  <!-- نظام التصميم الموحّد -->
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/rtl.css" />
</head>
<body>

  <div class="sr-page">

    <!-- ===== مسار التنقل ===== -->
    <div class="breadcrumb">
      <a href="teacher-dashboard.html" class="breadcrumb-item">لوحة التحكم</a>
      <span class="breadcrumb-separator">›</span>
      <a href="#" id="backToGradesLink" class="breadcrumb-item">النتائج</a>
      <span class="breadcrumb-separator">›</span>
      <span class="breadcrumb-item active">مراجعة التسليم</span>
    </div>

    <!-- ===== حالة التحميل ===== -->
    <div id="loadingState" class="exam-loading">
      <div class="loading-spinner"></div>
      <p>بنحمّل إجابات الطالب...</p>
    </div>

    <!-- ===== حالة الخطأ ===== -->
    <div id="errorState" class="exam-error hidden">
      <div class="error-icon">⚠️</div>
      <h3 id="errorText"></h3>
      <a href="teacher-dashboard.html" class="btn btn-primary">رجوع للوحة التحكم</a>
    </div>

    <!-- ===== المحتوى ===== -->
    <div id="contentWrapper" class="hidden">

      <!-- رأس الصفحة -->
      <div class="sr-header">
        <div class="sr-header-info">
          <h1 id="studentName"></h1>
          <p id="studentMeta"></p>
        </div>
        <span id="statusBadge" class="grade-badge"></span>
      </div>

      <!-- ملخص الدرجات (بيتحدّث لحظيًا وانت بتصحح) -->
      <div class="sr-summary">
        <div class="sr-summary-item">
          <span class="sr-summary-label">الاختياري</span>
          <strong id="summaryMcq">—</strong>
        </div>
        <div class="sr-summary-item">
          <span class="sr-summary-label">المقالي</span>
          <strong id="summaryEssay">—</strong>
        </div>
        <div class="sr-summary-item sr-summary-total">
          <span class="sr-summary-label">الإجمالي</span>
          <strong id="summaryTotal">—</strong>
        </div>
        <div class="sr-summary-item">
          <span class="sr-summary-label">النسبة</span>
          <strong id="summaryPercentage">—</strong>
        </div>
      </div>

      <!-- قائمة الإجابات -->
      <div id="answersList"></div>

      <!-- شريط الإجراءات السفلي (ثابت أثناء التمرير) -->
      <div class="sr-actions">
        <button id="prevStudentBtn" class="btn btn-outline" type="button">→ الطالب السابق</button>
        <span id="navPosition" class="sr-nav-position"></span>
        <button id="nextStudentBtn" class="btn btn-outline" type="button">الطالب التالي ←</button>
        <button id="saveBtn" class="btn btn-primary" type="button">💾 حفظ التصحيح</button>
      </div>

    </div>
  </div>

  <!-- ===== تنسيقات خاصة بالصفحة دي بس ===== -->
  <style>
    .sr-page {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 20px 120px;
    }

    /* رأس الصفحة */
    .sr-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .sr-header h1 {
      font-size: 22px;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .sr-header p {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* شارات الحالة (نفس شارات صفحة النتائج) */
    .grade-badge {
      display: inline-block;
      padding: 4px 11px;
      border-radius: 20px;
      font-size: .76rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .grade-badge.graded  { background: var(--green-light);  color: var(--green); }
    .grade-badge.pending { background: var(--orange-light); color: var(--orange); }

    /* ملخص الدرجات */
    .sr-summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 22px;
    }
    .sr-summary-item {
      background: var(--bg-subtle);
      border-radius: 10px;
      padding: 12px 10px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .sr-summary-label {
      font-size: .75rem;
      color: var(--text-light);
    }
    .sr-summary-item strong {
      font-size: 1.05rem;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .sr-summary-total {
      background: var(--primary-light);
    }
    .sr-summary-total strong { color: var(--primary); }

    /* كارت سؤال مقالي اتصحح */
    .review-card.graded-essay { border-right-color: var(--green); }

    /* الإجابة النموذجية */
    .sr-model-answer {
      background: var(--bg-subtle);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-size: .9rem;
      color: var(--text);
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .sr-model-answer strong {
      display: block;
      margin-bottom: 4px;
      color: var(--text-muted);
      font-size: .82rem;
    }

    .sr-student-answer-label {
      font-size: .82rem;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .sr-answer-image {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      display: block;
      margin-bottom: 10px;
    }

    /* صندوق التصحيح */
    .sr-grading-box {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px dashed var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .sr-grading-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .sr-grading-row label {
      font-size: .85rem;
      font-weight: 600;
      color: var(--text-muted);
    }
    .sr-score-input {
      width: 90px;
      padding: 8px 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: .95rem;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .sr-score-input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .sr-grading-row .btn {
      padding: 7px 14px;
      font-size: .8rem;
    }

    .sr-feedback-row {
      flex-direction: column;
      align-items: stretch;
    }
    .sr-feedback-input {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: .92rem;
      font-family: inherit;
      width: 100%;
      box-sizing: border-box;
      background: var(--surface);
      color: var(--text);
      resize: vertical;
    }
    .sr-feedback-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* شريط الإجراءات السفلي */
    .sr-actions {
      position: sticky;
      bottom: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 14px 16px;
      margin: 24px -20px -120px;
      box-shadow: 0 -2px 12px rgba(0,0,0,.06);
    }
    .sr-actions .btn:disabled {
      opacity: .5;
      cursor: not-allowed;
    }
    .sr-nav-position {
      font-size: .85rem;
      font-weight: 600;
      color: var(--text-light);
      white-space: nowrap;
    }

    /* تجاوب الموبايل */
    @media (max-width: 640px) {
      .sr-summary { grid-template-columns: repeat(2, 1fr); }
      .sr-actions { gap: 8px; padding: 12px 10px; }
      .sr-actions .btn { flex: 1; min-width: 120px; }
      .sr-nav-position { flex-basis: 100%; text-align: center; order: -1; }
    }
  </style>

  <!-- منطق الصفحة (ES Module زي باقي المشروع) -->
  <script type="module" src="../js/teacher/submission-review.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js');
      });
    }
  </script>
</body>
</html>
