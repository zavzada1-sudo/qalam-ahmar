<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>قلم أحمر - لوحة تحكم المدرس</title>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#c0392b">
  <link rel="apple-touch-icon" href="../assets/icons/icon-192.png">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
</head>
<body>

  <div class="dashboard-layout">

    <!-- القائمة الجانبية -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <span>🖊️</span>
        <span>قلم أحمر</span>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" type="button">
          <span class="nav-icon">⌂</span>
          <span>لوحة التحكم</span>
        </button>
        <a href="create-exam.html" class="nav-item">
          <span class="nav-icon">✦</span>
          <span>إنشاء امتحان</span>
        </a>
        <button class="nav-item" type="button">
          <span class="nav-icon">▦</span>
          <span>الفصول والطلاب</span>
        </button>
        <button class="nav-item" type="button">
          <span class="nav-icon">✓</span>
          <span>الحضور</span>
        </button>
        <button class="nav-item" type="button">
          <span class="nav-icon">▤</span>
          <span>التقارير</span>
        </button>
      </nav>

      <button class="sidebar-logout" id="logoutBtn" type="button">
        <span>↪</span>
        <span>تسجيل الخروج</span>
      </button>
    </aside>

    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- المحتوى الرئيسي -->
    <main class="dashboard-content">

      <!-- الشريط العلوي -->
      <header class="dashboard-topbar">
        <div style="display: flex; align-items: center; gap: 12px;">
          <button class="menu-toggle" id="menuToggle" type="button" aria-label="القائمة">☰</button>
          <div class="topbar-greeting">
            <h1>لوحة التحكم</h1>
            <p>مرحبًا بك في منصتك</p>
          </div>
        </div>

        <div class="topbar-profile">
          <div class="profile-info" style="text-align: left;">
            <strong id="teacherName">جاري التحميل...</strong>
            <span>حساب مدرس</span>
          </div>
          <div class="profile-avatar" id="teacherInitial">م</div>
        </div>
      </header>

      <!-- كروت الإحصائيات -->
      <section class="stats-grid">
        <article class="stat-card red">
          <span class="stat-icon">▦</span>
          <div class="stat-info">
            <strong id="classesCount">0</strong>
            <p>الفصول</p>
          </div>
        </article>
        <article class="stat-card blue">
          <span class="stat-icon">♟</span>
          <div class="stat-info">
            <strong id="studentsCount">0</strong>
            <p>الطلاب</p>
          </div>
        </article>
        <article class="stat-card orange">
          <span class="stat-icon">✦</span>
          <div class="stat-info">
            <strong id="assessmentsCount">0</strong>
            <p>الامتحانات والواجبات</p>
          </div>
        </article>
        <article class="stat-card green">
          <span class="stat-icon">✓</span>
          <div class="stat-info">
            <strong id="pendingCount">0</strong>
            <p>بانتظار التصحيح</p>
          </div>
        </article>
      </section>

      <!-- قائمة الامتحانات -->
      <section class="dashboard-section">
        <div class="section-header">
          <h2>امتحاناتي</h2>
          <a href="create-exam.html" class="btn btn-primary">+ إنشاء امتحان</a>
        </div>

        <div id="examsList" class="exams-grid">
          <p class="loading-text">جاري تحميل الامتحانات...</p>
        </div>
      </section>

    </main>
  </div>

  <script type="module" src="../js/teacher/dashboard.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js');
      });
    }
  </script>
</body>
</html>
