<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>قلم أحمر - حسابي</title>
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#c0392b">
  <link rel="apple-touch-icon" href="../assets/icons/icon-192.png">
  <script>
  if (localStorage.getItem('qalam_theme') === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
</script>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
</head>
<body>

  <div class="dashboard-layout">

    <!-- القائمة الجانبية -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <span>🖊️</span>
        <span>قلم أحمر</span>
      </div>

      <nav class="sidebar-nav">
        <a href="teacher-dashboard.html" class="nav-item">
          <span class="nav-icon">⌂</span>
          <span>لوحة التحكم</span>
        </a>
        <a href="create-exam.html" class="nav-item">
          <span class="nav-icon">✦</span>
          <span>إنشاء امتحان</span>
        </a>
        <a href="classes.html" class="nav-item">
          <span class="nav-icon">▦</span>
          <span>الفصول والطلاب</span>
        </a>

        <a href="materials.html" class="nav-item">
          <span class="nav-icon">📚</span>
          <span>المواد التعليمية</span>
        </a>

        <a href="teacher-profile.html" class="nav-item active">
          <span class="nav-icon">👤</span>
          <span>حسابي</span>
        </a>
        
        <a href="attendance.html" class="nav-item">
          <span class="nav-icon">📋</span>
          <span>الحضور</span>
        </a>

        <a href="reports.html" class="nav-item">
          <span class="nav-icon">▤</span>
          <span>التقارير</span>
        </a>
      </nav>

      <button class="sidebar-logout" id="logoutBtn" type="button">
        <span>↪</span>
        <span>تسجيل الخروج</span>
      </button>
    </aside>

    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- المحتوى الرئيسي -->
    <main class="dashboard-content">

      <!-- الشريط العلوي -->
      <header class="dashboard-topbar">
        <div style="display: flex; align-items: center; gap: 12px;">
          <button class="menu-toggle" id="menuToggle" type="button" aria-label="القائمة">☰</button>
          <div class="topbar-greeting">
            <h1>حسابي</h1>
            <p>بياناتك وإدارة حسابات طلابك</p>
          </div>
        </div>
      </header>

      <!-- ======== بياناتي ======== -->
      <section>
        <div class="section-header">
          <h2>بياناتي</h2>
        </div>

        <div class="profile-card">
          <div class="profile-head">
            <div class="profile-avatar" id="profileAvatar">؟</div>
            <div>
              <div class="profile-value" id="profileName" style="font-size: 1.1rem;">—</div>
              <div class="profile-label" id="profileEmail">—</div>
            </div>
          </div>

          <div class="profile-divider"></div>

          <div class="profile-row-item">
            <span class="profile-label">الـ ID الخاص بك (الطلاب بيستخدموه عشان يلاقوك)</span>
            <span class="profile-code">
              <strong id="profileCode">—</strong>
              <button class="gd-btn gd-btn-primary" id="copyCodeBtn" type="button">نسخ</button>
            </span>
          </div>

          <div class="profile-row-item">
            <span class="profile-label">الاشتراك المتبقي</span>
            <span class="profile-value" id="profileSubscription">—</span>
          </div>
        </div>
      </section>

      <!-- ======== طلابي ======== -->
      <section>
        <div class="section-header">
          <h2>طلابي (<span id="studentsCount">0</span>)</h2>
        </div>

        <input type="search" id="studentSearch" class="gd-search"
               placeholder="ابحث باسم الطالب أو الكود أو الإيميل..." autocomplete="off">

        <!-- شريط تحديد الطلبة + إجراءات موعد الدفع (بند جديد) -->
        <div class="pm-select-bar">
          <label class="pm-select-all">
            <input type="checkbox" id="selectAllCheckbox">
            <span>تحديد الكل</span>
          </label>
          <span id="selectedCount" class="pm-selected-count hidden"></span>
          <div class="pm-actions hidden" id="paymentActionsBar">
            <button type="button" class="btn btn-primary" id="setPaymentBtn">💰 تحديد موعد الدفع</button>
            <button type="button" class="btn btn-outline" id="clearPaymentBtn">إلغاء موعد الدفع</button>
          </div>
        </div>

        <div id="studentsMessage" class="gd-message"></div>

        <div id="studentsList" class="gd-list">
          <p class="loading-text">جاري التحميل...</p>
        </div>
      </section>

    </main>
  </div>

  <style>
    /* ---------- شريط التحديد المتعدد ---------- */
    .pm-select-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin: 10px 0 6px;
    }
    .pm-select-all {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13.5px;
      cursor: pointer;
      user-select: none;
      color: var(--text);
    }
    .pm-selected-count {
      font-size: 13px;
      color: var(--text-light, #777);
    }
    .pm-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* ---------- checkbox جنب كل طالب ---------- */
    .pm-checkbox-wrap {
      display: flex;
      align-items: flex-start;
      padding-inline-end: 10px;
      padding-top: 4px;
    }
    .pm-student-checkbox {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    /* ---------- شارة موعد الدفع في صف الطالب ---------- */
    .pm-badge {
      display: inline-block;
      font-size: 11.5px;
      padding: 2px 8px;
      border-radius: 20px;
      background: #fff8ef;
      border: 1px solid #ffe0b2;
      color: #b9651a;
      margin-top: 4px;
    }
    .pm-badge.overdue {
      background: #fdecea;
      border-color: #e6a19b;
      color: #c0392b;
    }

    /* ---------- مودال تحديد موعد الدفع ---------- */
    .pm-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(17, 24, 39, 0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 10000; padding: 16px;
    }
    .pm-modal {
      background: var(--card-bg, #fff);
      border-radius: var(--radius, 14px);
      max-width: 380px; width: 100%;
      padding: 22px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .pm-modal h3 { margin: 0 0 16px; font-size: 17px; color: var(--text, #222); }
    .pm-form-group { margin-bottom: 14px; }
    .pm-form-group label {
      display: block;
      font-size: 12.5px;
      color: var(--text-light, #777);
      margin-bottom: 5px;
    }
    .pm-form-group input {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid var(--border, #ddd);
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      background: var(--input-bg, #fff);
      color: var(--text);
    }
    .pm-form-group input:focus { outline: none; border-color: #c0392b; }
    .pm-modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 8px;
    }

    @media (max-width: 640px) {
      .pm-select-bar { flex-direction: column; align-items: flex-start; }
    }
  </style>

  <script type="module" src="../js/teacher/teacher-profile.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js');
      });
    }
  </script>
</body>
</html>
