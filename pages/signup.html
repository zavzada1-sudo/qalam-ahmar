<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>قلم أحمر - إنشاء حساب</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
</head>
<body>

  <div class="login-container">
    <h1 class="logo">🖊️ قلم أحمر</h1>

    <div class="role-tabs">
      <button id="teacherTab" class="tab active" type="button">مدرس</button>
      <button id="studentTab" class="tab" type="button">طالب</button>
    </div>

    <form id="signupForm" class="login-form">
      <input type="text" id="fullName" placeholder="الاسم الكامل" required>
      <input type="email" id="email" placeholder="البريد الإلكتروني" required>
      <input type="tel" id="phone" placeholder="رقم الهاتف" required>
      <input type="password" id="password" placeholder="كلمة المرور" required>
      <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور" required>
      <button type="submit" class="btn-primary">إنشاء حساب</button>
      <p id="signupError" class="error-message"></p>
    </form>

    <p class="switch-auth">
      عندك حساب بالفعل؟ <a href="../index.html">تسجيل الدخول</a>
    </p>
  </div>

  <script type="module" src="../js/auth/signup.js"></script>
</body>
</html>
