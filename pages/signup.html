<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>قلم أحمر - إنشاء حساب</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
</head>
<body>

  <div class="login-container">
    <h1 class="logo">🖊️ قلم أحمر</h1>

    <div class="role-tabs">
      <button id="teacherTab" class="tab active" type="button">مدرس</button>
      <button id="studentTab" class="tab" type="button">طالب</button>
    </div>

    <form id="signupForm" class="login-form">
      <input type="text" id="fullName" placeholder="الاسم الكامل" autocomplete="name" required>
      <input type="email" id="email" placeholder="البريد الإلكتروني" autocomplete="email" required>
      <input type="tel" id="phone" placeholder="رقم الهاتف" autocomplete="tel" required>

      <div class="password-field">
        <input type="password" id="password" placeholder="كلمة المرور" autocomplete="new-password" required>
        <button type="button" id="togglePassword" class="toggle-password">👁️</button>
      </div>

      <div
